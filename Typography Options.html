<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>School Stories — Typography Options</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&family=Public+Sans:wght@400;500;600;700&family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;height:100%;background:#e9e6e0;font-family:"Hanken Grotesk",sans-serif}
  #root{height:100%}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const INK = "#17304a", INK_SOFT = "#4a5d70", PAPER = "#f6f0e5", GOLD = "#e6a93c", GOLD_DEEP = "#c2871d", TERRA = "#c2632f", LINE = "rgba(23,48,74,0.13)";

// Each typographic direction. `head`/`body` are font-families; tuning per option.
const OPTIONS = [
  {
    id: "editorial",
    label: "01 · Editorial Warmth",
    head: "'Newsreader', Georgia, serif",
    body: "'Hanken Grotesk', sans-serif",
    headWeight: 500, headSpacing: "-0.02em", headLine: 1.08, headSize: 46,
    italicAccent: true, accentWeight: 500,
    eyebrowFont: "body",
    note: "Newsreader + Hanken Grotesk",
    personality: "Story-led, warm, editorial. The current direction — a literary serif with a clean humanist sans.",
    current: true,
  },
  {
    id: "humanist",
    label: "02 · Modern Humanist",
    head: "'Bricolage Grotesque', sans-serif",
    body: "'Hanken Grotesk', sans-serif",
    headWeight: 700, headSpacing: "-0.02em", headLine: 1.05, headSize: 42,
    italicAccent: false, accentWeight: 700,
    eyebrowFont: "body",
    note: "Bricolage Grotesque + Hanken Grotesk",
    personality: "Friendly and contemporary. A characterful display sans gives warmth without a serif — approachable and a little playful.",
  },
  {
    id: "trust",
    label: "03 · Classic Trust",
    head: "'Source Serif 4', Georgia, serif",
    body: "'Public Sans', sans-serif",
    headWeight: 600, headSpacing: "-0.015em", headLine: 1.12, headSize: 40,
    italicAccent: true, accentWeight: 600,
    eyebrowFont: "body",
    note: "Source Serif 4 + Public Sans",
    personality: "Established and dependable. Reads like a school board you trust — sober, credible, reassuring for principals and P&C alike.",
  },
  {
    id: "optimistic",
    label: "04 · Optimistic Sans",
    head: "'Schibsted Grotesk', sans-serif",
    body: "'Schibsted Grotesk', sans-serif",
    headWeight: 800, headSpacing: "-0.03em", headLine: 1.08, headSize: 40,
    italicAccent: true, accentWeight: 600,
    eyebrowFont: "body",
    note: "Schibsted Grotesk (one family)",
    personality: "Clean, modern, optimistic. A single confident sans across the whole site — bold headings, easy body. Bright and uncomplicated.",
  },
  {
    id: "refined",
    label: "05 · Refined Editorial",
    head: "'Spectral', Georgia, serif",
    body: "'Figtree', sans-serif",
    headWeight: 500, headSpacing: "-0.01em", headLine: 1.1, headSize: 45,
    italicAccent: true, accentWeight: 500,
    eyebrowFont: "body",
    note: "Spectral + Figtree",
    personality: "Elegant and premium. A high-contrast serif with a soft geometric sans — feels considered, calm, a touch upmarket.",
  },
];

function Mark() {
  return (
    <span style={{ width: 30, height: 30, borderRadius: 9, background: INK, position: "relative", flex: "0 0 auto", display: "inline-block" }}>
      <span style={{ position: "absolute", width: 12, height: 12, borderRadius: "50% 50% 50% 2px", background: GOLD, left: 6, top: 8 }} />
      <span style={{ position: "absolute", width: 4.5, height: 4.5, borderRadius: "50%", background: PAPER, top: 8, right: 8 }} />
    </span>
  );
}

function Specimen({ o }) {
  const eyebrowFamily = o.eyebrowFont === "body" ? o.body : o.head;
  const accentStyle = {
    color: TERRA,
    fontStyle: o.italicAccent ? "italic" : "normal",
    fontWeight: o.accentWeight,
  };
  return (
    <div style={{ minHeight: "100%", background: PAPER, padding: "44px 46px 128px", boxSizing: "border-box", position: "relative" }}>
      {o.current && (
        <span style={{ position: "absolute", top: 22, right: 24, background: INK, color: "#fdf8ee", fontFamily: o.body, fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", padding: "5px 11px", borderRadius: 999 }}>Current</span>
      )}
      {/* wordmark */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 30 }}>
        <Mark />
        <span style={{ fontFamily: o.head, fontWeight: o.id === "optimistic" || o.id === "humanist" ? 700 : 600, fontSize: 21, color: INK, letterSpacing: o.id==="optimistic" ? "-0.02em":"0" }}>
          School <strong style={{ fontWeight: o.id === "optimistic" || o.id === "humanist" ? 800 : 700 }}>Stories</strong>
        </span>
      </div>

      {/* eyebrow */}
      <div style={{ fontFamily: eyebrowFamily, fontSize: 12.5, fontWeight: 600, letterSpacing: "0.14em", textTransform: "uppercase", color: GOLD_DEEP, display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
        <span style={{ width: 22, height: 1.5, background: GOLD_DEEP, display: "inline-block" }} />
        Social storytelling for schools
      </div>

      {/* headline */}
      <h1 style={{ margin: 0, fontFamily: o.head, fontWeight: o.headWeight, fontSize: o.headSize, lineHeight: o.headLine, letterSpacing: o.headSpacing, color: INK }}>
        A school's first front door isn't the gate. It's the <span style={accentStyle}>feed.</span>
      </h1>

      {/* body */}
      <p style={{ margin: "20px 0 0", fontFamily: o.body, fontSize: 16.5, lineHeight: 1.62, color: INK_SOFT, maxWidth: "33em" }}>
        Before the open day, the enrolment form, or ever visiting — families look you up online. School Stories turns your channels into a living front door, without adding to staff workload.
      </p>

      {/* buttons */}
      <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
        <span style={{ fontFamily: o.body, fontWeight: 600, fontSize: 14.5, background: GOLD, color: "#3a2a06", padding: "12px 20px", borderRadius: 999 }}>Book a discovery call →</span>
        <span style={{ fontFamily: o.body, fontWeight: 600, fontSize: 14.5, background: "transparent", color: INK, padding: "12px 20px", borderRadius: 999, border: "1.5px solid " + LINE }}>See the proof</span>
      </div>

      {/* footer specimen */}
      <div style={{ position: "absolute", left: 46, right: 46, bottom: 34, borderTop: "1px solid " + LINE, paddingTop: 18, display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 16 }}>
        <div>
          <div style={{ fontFamily: o.body, fontSize: 11.5, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#8a96a0", marginBottom: 7 }}>Pairing</div>
          <div style={{ fontFamily: o.body, fontSize: 14.5, color: INK, fontWeight: 600 }}>{o.note}</div>
          <p style={{ fontFamily: o.body, fontSize: 12.5, color: INK_SOFT, margin: "8px 0 0", maxWidth: "30em", lineHeight: 1.5 }}>{o.personality}</p>
        </div>
        <div style={{ fontFamily: o.head, color: INK, lineHeight: 1, textAlign: "right", flex: "0 0 auto" }}>
          <span style={{ fontSize: 26, fontWeight: 400 }}>Aa</span>
          <span style={{ fontSize: 26, fontWeight: o.headWeight, marginLeft: 8 }}>Aa</span>
          {o.italicAccent && <span style={{ fontSize: 26, fontStyle: "italic", marginLeft: 8, color: TERRA }}>Aa</span>}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="type" title="Typography Directions" subtitle="Five pairings, same hero — pick one (or mix). Click any card to focus. Tell me the number you like.">
        {[...OPTIONS].reverse().map((o) => (
          <DCArtboard key={o.id} id={o.id} label={o.label} width={620} height={648}>
            <Specimen o={o} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
